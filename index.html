<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inmobiliaria - Catálogo de Lotes</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS para el mapa gratuito -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        #map {
            height: 350px;
            width: 100%;
            border-radius: 1rem;
            z-index: 10;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            scroll-margin-top: 20px; /* Ajustado al no haber cabecera pegajosa */
        }

        @media (min-width: 768px) {
            #map {
                height: 500px;
            }
        }

        .active-card {
            border: 2px solid #22c55e !important;
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            padding: 4px;
        }

        .detail-label {
            font-weight: 600;
            color: #64748b;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        html {
            scroll-behavior: smooth;
        }

        #modalImg {
            object-fit: contain;
        }
    </style>
</head>
<body class="text-slate-800">

    <main class="max-w-7xl mx-auto px-4 py-6 md:py-8">
        <section class="mb-8 md:mb-12">
            <div class="flex flex-col sm:flex-row sm:items-end justify-between mb-4 md:mb-6 gap-3">
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">Inventario de Lotes</h1>
                    <p class="text-slate-500 text-sm mt-1">Sarasota & Charlotte Counties, FL</p>
                </div>
                <div class="inline-flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm w-fit">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-xs font-bold text-slate-700">9 Lotes Disponibles</span>
                </div>
            </div>
            <div id="map"></div>
        </section>

        <section>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" id="grid"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/95 z-[100] hidden items-center justify-center p-2 backdrop-blur-sm" onclick="closeModal()">
        <button class="absolute top-4 right-4 text-white p-2" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <img id="modalImg" class="max-w-full max-h-[85vh] rounded-lg shadow-2xl transition-transform duration-300 scale-95" src="" alt="Vista ampliada">
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        let markers = [];
        
        const properties = [
            {
                id: 1,
                addr: "Lot 4 Eureka Ave, North Pt, FL 34291",
                price: "$25,000",
                muni: "City of North Port",
                sub: "1579- PORT CHARLOTTE SUB 14 REPLAT",
                area: "929.03 m2 (10,000 Sq.Ft.)",
                zoning: "SF2, Residencial, Single Family",
                flood: "No necesita seguro",
                lat: 27.0705, lng: -82.2254,
                img: "Lot_4_Eureka_Ave_North_Pt_FL_34291.jpg"
            },
            {
                id: 2,
                addr: "Lot 22 Eureka Ave, North Pt, FL 34291",
                price: "$25,000",
                muni: "City of North Port",
                sub: "1579- PORT CHARLOTTE SUB 14 REPLAT",
                area: "929.03 m2 (10,000 Sq.Ft.)",
                zoning: "SF2, Residencial, Single Family",
                flood: "No necesita seguro",
                lat: 27.0698, lng: -82.2262,
                img: "Lot_22_Eureka_Ave_North_Pt_FL_34291.jpg"
            },
            {
                id: 3,
                addr: "Afterglow #5, North Pt, FL 34286",
                price: "$18,000",
                muni: "City of North Port",
                sub: "1778- PORT CHARLOTTE SUB 46",
                area: "929.03 m2 (10,000 Sq.Ft.)",
                zoning: "SF2, Residencial, Single Family",
                flood: "No necesita seguro",
                lat: 27.047, lng: -82.220,
                img: "Afterglow_5_North_Pt_FL_34286.jpg"
            },
            {
                id: 4,
                addr: "Langlais Dr #17, North Pt, FL 34286",
                price: "$18,000",
                muni: "City of North Port",
                sub: "1779- PORT CHARLOTTE SUB 47",
                area: "911.75 m2 (9,814 Sq.Ft.)",
                zoning: "SF2, Residencial, Single Family",
                flood: "No necesita seguro",
                lat: 27.039, lng: -82.227,
                img: "Langlais_Dr_17_North_Pt_FL_34286.jpg"
            },
            {
                id: 5,
                addr: "Annatto St #8, North Pt, FL 34286",
                price: "$18,000",
                muni: "City of North Port",
                sub: "1779- PORT CHARLOTTE SUB 47",
                area: "929.03 m2 (10,000 Sq.Ft.)",
                zoning: "SF2, Residencial, Single Family",
                flood: "No necesita seguro",
                lat: 27.037, lng: -82.224,
                img: "Annatto_St_8_North_Pt_FL_34286.jpg"
            },
            {
                id: 6,
                addr: "LOTE # 9 LANCEWOOD ROAD, NORTH PORT",
                price: "$18,000",
                muni: "City of North Port",
                sub: "1779- PORT CHARLOTTE SUB 47",
                area: "1,041 m2 (11,214 Sq.Ft.)",
                zoning: "SF2, Residencial low",
                flood: "No necesita seguro",
                lat: 27.045, lng: -82.170,
                img: "LOTE_9_LANCEWOOD_ROAD_NORTH_PORT_SARASOTA_FL.jpg"
            },
            {
                id: 7,
                addr: "309 HAMDEN ST PORT CHARLOTTE FL",
                price: "$25,000",
                muni: "City of North Port",
                sub: "No disponible",
                area: "A consultar",
                zoning: "No disponible",
                flood: "No disponible",
                lat: 26.981, lng: -82.112,
                img: "309_HAMDEN_ST_PORT_CHARLOTTE_FL.jpg"
            },
            {
                id: 8,
                addr: "218 & 226 HAMDEN ST PORT CHARLOTTE FL",
                price: "$60,000",
                muni: "City of North Port",
                sub: "2 Terrenos Incluidos",
                area: "Doble lote",
                zoning: "Residencial",
                flood: "No disponible",
                lat: 26.982, lng: -82.115,
                img: "AND_5_218_AND_226_HAMDEN_ST_PORT_CHARLOTTE_FL.jpg"
            },
            {
                id: 9,
                addr: "HARWOOD ST NORTH PORT FL 34288",
                price: "$20,000",
                muni: "City of North Port",
                sub: "No disponible",
                area: "A consultar",
                zoning: "Residencial",
                flood: "No disponible",
                lat: 27.088, lng: -82.180,
                img: "HARWOOD_ST_NORTH_PORT_SARASOTA_FL_34288.jpg"
            }
        ];

        function initApp() {
            map = L.map('map', {
                scrollWheelZoom: false
            }).setView([27.040, -82.180], 12);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri'
            }).addTo(map);

            buildCards();

            properties.forEach((p, index) => {
                const marker = L.circleMarker([p.lat, p.lng], {
                    radius: 12,
                    fillColor: "#22c55e",
                    color: "#fff",
                    weight: 3,
                    opacity: 1,
                    fillOpacity: 0.9
                }).addTo(map);

                marker.bindPopup(`
                    <div class="p-1">
                        <b class="block text-slate-900 text-sm">${p.addr}</b>
                        <span class="text-green-600 font-bold">${p.price}</span>
                    </div>
                `);
                
                markers.push(marker);

                marker.on('click', () => {
                    highlightCard(index);
                    document.getElementById("map").scrollIntoView({ behavior: "smooth", block: "start" });
                });
            });
        }

        function handleImageError(img, fileName) {
            img.src = `https://via.placeholder.com/600x400?text=Lote+disponible`;
            img.onerror = null;
        }

        function buildCards() {
            const grid = document.getElementById("grid");
            grid.innerHTML = "";
            properties.forEach((p, index) => {
                const card = document.createElement("div");
                card.className = "property-card group bg-white border border-slate-200 rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 hover:shadow-xl flex flex-col";
                card.id = "card-" + index;

                card.innerHTML = `
                    <div class="relative h-48 md:h-52 overflow-hidden bg-slate-100">
                        <img src="${p.img}" 
                             class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" 
                             onerror="handleImageError(this, '${p.img}')"
                             onclick="event.stopPropagation(); openModal(this.src)">
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-2 py-1 rounded-full text-[9px] font-bold shadow-sm uppercase tracking-widest text-slate-700 border border-white/50">Disponible</div>
                        <div class="absolute bottom-3 right-3 bg-green-600 text-white px-3 py-1 rounded-xl text-md md:text-lg font-bold shadow-lg border border-green-500/30">${p.price}</div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <h2 class="text-base md:text-lg font-bold text-slate-900 mb-1 leading-snug h-12 overflow-hidden">${p.addr}</h2>
                        <div class="flex items-center gap-1.5 text-slate-400 text-[10px] mb-4 uppercase tracking-wide font-semibold">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                             </svg> ${p.muni}
                        </div>
                        
                        <div class="grid grid-cols-1 gap-3 mb-5 text-xs md:text-sm">
                            <div class="flex flex-col border-l-2 border-slate-100 pl-3">
                                <span class="detail-label">Subdivisión</span>
                                <span class="text-slate-700 font-medium truncate">${p.sub}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="flex flex-col border-l-2 border-slate-100 pl-3">
                                    <span class="detail-label">Área</span>
                                    <span class="text-slate-700 font-medium truncate">${p.area}</span>
                                </div>
                                <div class="flex flex-col border-l-2 border-slate-100 pl-3">
                                    <span class="detail-label">Zonificación</span>
                                    <span class="text-slate-700 font-medium truncate">${p.zoning}</span>
                                </div>
                            </div>
                            <div class="flex flex-col border-l-2 border-blue-100 pl-3 bg-blue-50/20 py-1">
                                <span class="detail-label text-blue-600">Flood Zone</span>
                                <span class="text-slate-700 font-medium text-[11px] italic">${p.flood}</span>
                            </div>
                        </div>

                        <div class="flex items-center justify-between border-t border-slate-100 pt-4 mt-auto">
                            <span class="text-[9px] text-slate-300 font-mono tracking-tighter">REF: ${2024000 + p.id}</span>
                            <button class="text-green-600 font-bold text-xs flex items-center gap-1 hover:translate-x-1 transition-transform">
                                Ver mapa
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    const zoomLevel = window.innerWidth < 768 ? 16 : 17;
                    map.flyTo([p.lat, p.lng], zoomLevel, { duration: 1.5 });
                    markers[index].openPopup();
                    highlightCard(index);
                    document.getElementById("map").scrollIntoView({ behavior: "smooth", block: "start" });
                };

                grid.appendChild(card);
            });
        }

        function highlightCard(index) {
            document.querySelectorAll('.property-card').forEach(c => c.classList.remove('active-card'));
            const selectedCard = document.getElementById('card-' + index);
            if (selectedCard) {
                selectedCard.classList.add('active-card');
            }
        }

        function openModal(src) {
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modalImg");
            modalImg.src = src;
            modal.classList.remove("hidden");
            modal.classList.add("flex");
            setTimeout(() => {
                modalImg.classList.remove("scale-95");
                modalImg.classList.add("scale-100");
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modalImg");
            modalImg.classList.remove("scale-100");
            modalImg.classList.add("scale-95");
            setTimeout(() => {
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }, 200);
        }

        window.onload = initApp;
    </script>
</body>
</html>
