<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lotes en Venta</title>

<style>

body{
font-family:Segoe UI,Arial;
background:#eceff1;
margin:0;
padding:20px;
}

#map{
height:450px;
margin-bottom:40px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

.property-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.property-card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
cursor:pointer;
transition:.3s;
}

.property-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.image-box{
height:220px;
overflow:hidden;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

.details{
padding:18px;
}

.price{
font-size:1.4rem;
color:#27ae60;
font-weight:bold;
margin-bottom:10px;
}

.address{
font-size:1rem;
font-weight:600;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal img{
max-width:95%;
max-height:95%;
}

.close{
position:absolute;
top:25px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="property-grid" id="grid"></div>

<div class="modal" id="modal">
<span class="close" onclick="closeModal()">×</span>
<img id="modalImg">
</div>

<script>

let map;

const properties=[

{
addr:"Lot 4 Eureka Ave",
price:"$25,000",
lat:27.0705,
lng:-82.2254,
img:"Lot_4_Eureka_Ave_North_Pt_FL_34291.jpg"
},

{
addr:"Lot 22 Eureka Ave",
price:"$25,000",
lat:27.0698,
lng:-82.2262,
img:"Lot_22_Eureka_Ave_North_Pt_FL_34291.jpg"
},

{
addr:"Afterglow #5",
price:"$18,000",
lat:27.047,
lng:-82.220,
img:"Afterglow_5_North_Pt_FL_34286.jpg"
}

];

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{

zoom:11,
center:{lat:27.044,lng:-82.235},
mapTypeControl:true,
mapTypeId:"satellite"

});

buildCards();

properties.forEach((p,index)=>{

const marker=new google.maps.Marker({

position:{lat:p.lat,lng:p.lng},
map:map,
title:p.addr

});

const info=new google.maps.InfoWindow({

content:`<b>${p.addr}</b><br>${p.price}`

});

marker.addListener("click",()=>{

info.open(map,marker);

document.getElementById("card-"+index).scrollIntoView({behavior:"smooth"});

});

});

}

function buildCards(){

const grid=document.getElementById("grid");

properties.forEach((p,index)=>{

const card=document.createElement("div");

card.className="property-card";

card.id="card-"+index;

card.innerHTML=`

<div class="image-box">

<img src="${p.img}" onclick="openModal('${p.img}')" onerror="this.src='https://via.placeholder.com/600x400?text=Imagen+no+disponible'">

</div>

<div class="details">

<div class="price">${p.price}</div>

<div class="address">${p.addr}</div>

</div>

`;

card.onclick=()=>{

map.setZoom(16);

map.panTo({lat:p.lat,lng:p.lng});

};

grid.appendChild(card);

});

}

function openModal(src){

document.getElementById("modalImg").src=src;

document.getElementById("modal").style.display="flex";

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

</script>

<script async defer
src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&callback=initMap">
</script>

</body>
</html>
