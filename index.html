<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria - Lotes en Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .active-card {
            border: 2px solid #22c55e !important;
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .custom-info-window {
            padding: 8px;
            font-family: 'Inter', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-green-600 p-1.5 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
                <span class="text-xl font-bold tracking-tight">GeoLotes <span class="text-green-600">Pro</span></span>
            </div>
            <nav class="hidden md:flex gap-6 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-green-600 transition">Inicio</a>
                <a href="#" class="hover:text-green-600 transition">Propiedades</a>
                <a href="#" class="hover:text-green-600 transition">Contacto</a>
            </nav>
            <button class="bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-800 transition">
                Publicar Lote
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <section class="mb-10">
            <div class="flex items-end justify-between mb-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-900">Lotes Disponibles</h1>
                    <p class="text-slate-500">Explora terrenos exclusivos en North Port, FL</p>
                </div>
                <div class="flex gap-2">
                    <span class="flex items-center gap-1 text-sm font-medium bg-green-100 text-green-700 px-3 py-1 rounded-full">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        3 Disponibles
                    </span>
                </div>
            </div>
            <div id="map"></div>
        </section>

        <section>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="grid"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/90 z-[100] hidden items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300" onclick="closeModal()">
        <button class="absolute top-6 right-6 text-white hover:scale-110 transition" onclick="closeModal()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <img id="modalImg" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl transition-transform duration-300 scale-95" src="" alt="Vista previa">
    </div>

    <script>
        let map;
        let markers = [];
        const properties = [
            {
                id: 0,
                addr: "Lot 4 Eureka Ave",
                price: "$25,000",
                size: "0.25 Acres",
                lat: 27.0705,
                lng: -82.2254,
                img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=800&q=80",
                city: "North Port, FL 34291"
            },
            {
                id: 1,
                addr: "Lot 22 Eureka Ave",
                price: "$25,000",
                size: "0.23 Acres",
                lat: 27.0698,
                lng: -82.2262,
                img: "https://images.unsplash.com/photo-1500076656116-558758c991c1?auto=format&fit=crop&w=800&q=80",
                city: "North Port, FL 34291"
            },
            {
                id: 2,
                addr: "Afterglow #5",
                price: "$18,000",
                size: "0.45 Acres",
                lat: 27.047,
                lng: -82.220,
                img: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=800&q=80",
                city: "North Port, FL 34286"
            }
        ];

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: { lat: 27.060, lng: -82.225 },
                mapTypeId: "satellite",
                tilt: 45
            });

            buildCards();

            properties.forEach((p, index) => {
                const marker = new google.maps.Marker({
                    position: { lat: p.lat, lng: p.lng },
                    map: map,
                    title: p.addr,
                    animation: google.maps.Animation.DROP,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 10,
                        fillColor: "#22c55e",
                        fillOpacity: 1,
                        strokeWeight: 2,
                        strokeColor: "#ffffff",
                    }
                });

                markers.push(marker);

                const infoWindow = new google.maps.InfoWindow({
                    content: `<div class="custom-info-window"><h3 class="font-bold">${p.addr}</h3><p class="text-green-600">${p.price}</p></div>`
                });

                marker.addListener("click", () => {
                    infoWindow.open(map, marker);
                    highlightCard(index);
                });
            });
        }

        function buildCards() {
            const grid = document.getElementById("grid");
            properties.forEach((p, index) => {
                const card = document.createElement("div");
                card.className = "property-card group bg-white border border-slate-200 rounded-2xl overflow-hidden cursor-pointer transition-all duration-300 hover:shadow-xl";
                card.id = "card-" + index;

                card.innerHTML = `
                    <div class="relative h-56 overflow-hidden">
                        <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onclick="event.stopPropagation(); openModal('${p.img}')">
                        <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-xs font-bold shadow-sm">Venta</div>
                        <div class="absolute bottom-4 right-4 bg-green-600 text-white px-3 py-1 rounded-lg text-sm font-bold shadow-lg">${p.price}</div>
                    </div>
                    <div class="p-5">
                        <h2 class="text-lg font-bold text-slate-900">${p.addr}</h2>
                        <p class="text-slate-500 text-sm mb-4">${p.city}</p>
                        <div class="flex items-center justify-between border-t border-slate-100 pt-4">
                            <span class="text-sm font-semibold text-slate-700">${p.size}</span>
                            <button class="text-green-600 font-bold text-sm">Ver mapa</button>
                        </div>
                    </div>
                `;

                card.onclick = () => {
                    map.setZoom(17);
                    map.panTo({ lat: p.lat, lng: p.lng });
                    highlightCard(index);
                };

                grid.appendChild(card);
            });
        }

        function highlightCard(index) {
            document.querySelectorAll('.property-card').forEach(c => c.classList.remove('active-card'));
            const selectedCard = document.getElementById('card-' + index);
            selectedCard.classList.add('active-card');
            selectedCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            markers.forEach((m, i) => {
                if(i === index) {
                    m.setAnimation(google.maps.Animation.BOUNCE);
                    setTimeout(() => m.setAnimation(null), 1500);
                }
            });
        }

        function openModal(src) {
            const modal = document.getElementById("modal");
            const modalImg = document.getElementById("modalImg");
            modalImg.src = src;
            modal.classList.remove("hidden");
            modal.classList.add("flex");
        }

        function closeModal() {
            document.getElementById("modal").classList.add("hidden");
        }
    </script>

    <!-- RECUERDA REEMPLAZAR TU_API_KEY -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD9FdCW9CYeVsMb41Qwyt-PvXP1oUuslgIcallback=initMap"></script>
</body>
</html>
