<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Propiedades</title>

<style>

:root{
--primary:#1a252f;
--accent:#2980b9;
--bg:#eceff1;
--text:#2c3e50;
--white:#ffffff;
--success:#27ae60;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
background:var(--bg);
padding:20px;
}

.property-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
max-width:1200px;
margin:auto;
}

.property-card{
background:var(--white);
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
transition:.3s;
}

.property-card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.image-box{
height:220px;
cursor:pointer;
overflow:hidden;
background:#ddd;
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .4s;
}

.image-box:hover img{
transform:scale(1.05);
}

.details{
padding:18px;
}

.price{
font-size:1.4rem;
color:var(--success);
font-weight:700;
margin-bottom:10px;
}

.address{
font-size:1.05rem;
font-weight:600;
margin-bottom:15px;
color:var(--primary);
}

.info-list{
list-style:none;
font-size:.9rem;
}

.info-list li{
margin-bottom:6px;
}

.info-list span{
font-weight:bold;
color:#7f8c8d;
display:block;
font-size:.7rem;
text-transform:uppercase;
}

/* MODAL ZOOM */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.modal img{
width:100%;
height:auto;
max-width:1400px;
max-height:95vh;
object-fit:contain;
border-radius:6px;
box-shadow:0 0 40px black;
animation:zoom .3s ease;
}

@keyframes zoom{
from{transform:scale(.8);opacity:.5;}
to{transform:scale(1);opacity:1;}
}

.close{
position:absolute;
top:25px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

@media(max-width:600px){

body{
padding:10px;
}

.property-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="property-grid" id="grid"></div>

<div class="modal" id="modal">
<span class="close" onclick="closeModal()">×</span>
<img id="modalImg">
</div>

<script>

const properties=[

{
addr:"Lot 4 Eureka Ave, North Pt, FL 34291",
price:"$25,000",
muni:"City of North Port",
sub:"PORT CHARLOTTE SUB 14 REPLAT",
area:"929 m2 (10,000 Sq.Ft.)",
zone:"SF2 Residencial",
flood:"No Flood Insurance",
img:"Lot_4_Eureka_Ave_North_Pt_FL_34291.jpg"
},

{
addr:"Lot 22 Eureka Ave, North Pt, FL 34291",
price:"$25,000",
muni:"City of North Port",
sub:"PORT CHARLOTTE SUB 14 REPLAT",
area:"929 m2",
zone:"SF2 Residencial",
flood:"No Flood Insurance",
img:"Lot_22_Eureka_Ave_North_Pt_FL_34291.jpg"
},

{
addr:"Afterglow #5, North Pt FL",
price:"$18,000",
muni:"City of North Port",
sub:"PORT CHARLOTTE SUB 46",
area:"929 m2",
zone:"SF2 Residencial",
flood:"No Flood Insurance",
img:"Afterglow_5_North_Pt_FL_34286.jpg"
},

{
addr:"Langlais Dr #17",
price:"$18,000",
muni:"City of North Port",
sub:"PORT CHARLOTTE SUB 47",
area:"911 m2",
zone:"SF2 Residencial",
flood:"No Flood Insurance",
img:"Langlais_Dr_17_North_Pt_FL_34286.jpg"
},

{
addr:"Annatto St #8",
price:"$18,000",
muni:"City of North Port",
sub:"PORT CHARLOTTE SUB 47",
area:"929 m2",
zone:"SF2 Residencial",
flood:"No Flood Insurance",
img:"Annatto_St_8_North_Pt_FL_34286.jpg"
}

];

const grid=document.getElementById("grid");

properties.forEach(p=>{

const card=document.createElement("div");
card.className="property-card";

card.innerHTML=`

<div class="image-box">
<img src="${p.img}" onclick="openModal('${p.img}')" onerror="this.src='https://via.placeholder.com/600x400?text=Imagen+no+disponible'">
</div>

<div class="details">

<div class="price">${p.price}</div>

<div class="address">${p.addr}</div>

<ul class="info-list">

<li><span>Municipio</span>${p.muni}</li>

<li><span>Subdivision</span>${p.sub}</li>

<li><span>Area</span>${p.area}</li>

<li><span>Zoning</span>${p.zone}</li>

<li><span>Flood</span>${p.flood}</li>

</ul>

</div>

`;

grid.appendChild(card);

});

function openModal(src){

const modal=document.getElementById("modal");

document.getElementById("modalImg").src=src;

modal.style.display="flex";

}

function closeModal(){

document.getElementById("modal").style.display="none";

}

document.getElementById("modal").onclick=function(e){

if(e.target.id==="modal"){
closeModal();
}

}

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
closeModal();
}

});

</script>

</body>
</html>
