<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azacord Investing - Portafolio Inmobiliario</title>
    
    <!-- Tailwind CSS para un diseño moderno y responsivo -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS: Librería para el mapa interactivo -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Estilos personalizados para el mapa y las tarjetas */
        #map { height: 100%; width: 100%; }
        .leaflet-container { font-family: ui-sans-serif, system-ui, sans-serif; }
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .property-card {
            transition: all 0.2s ease-in-out;
        }
        .property-card:hover {
            transform: translateX(4px);
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col h-screen overflow-hidden">

    <!-- Encabezado / Logo -->
    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0 z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">A</div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Azacord Investing LLC</h1>
                <p class="text-xs text-slate-500 font-medium">Inversiones Inmobiliarias • North Port, FL</p>
            </div>
        </div>
        <div class="hidden md:flex items-center gap-6">
            <div class="text-right">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Activos Totales</p>
                <p class="text-sm font-bold text-slate-700">4 Propiedades</p>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded-full transition-colors shadow-sm">
                Contactar
            </button>
        </div>
    </nav>

    <main class="flex flex-1 overflow-hidden">
        <!-- Barra Lateral: Lista de Activos -->
        <aside class="w-full md:w-96 bg-white border-r border-slate-200 flex flex-col shrink-0 shadow-sm z-10">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50">
                <label class="relative block">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" id="search" placeholder="Buscar por calle o parcela..." class="w-full bg-white pl-10 pr-4 py-2 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all">
                </label>
            </div>
            
            <div id="property-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                <!-- Las propiedades se inyectan mediante JavaScript -->
            </div>
        </aside>

        <!-- Contenedor del Mapa -->
        <section class="flex-1 relative">
            <div id="map"></div>
            
            <!-- Botón flotante para móviles -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 md:hidden z-[1000]">
                <button onclick="document.querySelector('aside').scrollIntoView({behavior:'smooth'})" class="bg-slate-900 text-white px-6 py-2 rounded-full shadow-2xl text-sm font-bold flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    Ver Lista
                </button>
            </div>
        </section>
    </main>

    <!-- Leaflet JS: Librería de mapas -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Datos de las propiedades extraídos de tus documentos
        const properties = [
            {
                id: "0969061909",
                address: "HAMER TER",
                city: "North Port, FL",
                zip: "34291",
                price: 17000,
                area: "10,625 SF",
                lat: 27.0855,
                lng: -82.1645,
                use: "Residential Vacant",
                status: "Activo"
            },
            {
                id: "0970061722",
                address: "EUREKA AVE",
                city: "North Port, FL",
                zip: "34291",
                price: 11500,
                area: "10,000 SF",
                lat: 27.0818,
                lng: -82.1578,
                use: "Residential Vacant",
                status: "Activo"
            },
            {
                id: "1135078309",
                address: "CAROLINA ST",
                city: "North Port, FL",
                zip: "34288",
                price: 11900,
                area: "10,399 SF",
                lat: 27.0442,
                lng: -82.1248,
                use: "Residential Vacant",
                status: "Activo"
            },
            {
                id: "1136077906",
                address: "BENNINGTON ST",
                city: "North Port, FL",
                zip: "34288",
                price: 12500,
                area: "10,000 SF",
                lat: 27.0415,
                lng: -82.1315,
                use: "Residential Vacant",
                status: "Activo"
            }
        ];

        // 1. Inicializar el mapa
        const map = L.map('map', {
            zoomControl: false
        }).setView([27.065, -82.145], 12);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // 2. Cargar el estilo visual del mapa
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        const listContainer = document.getElementById('property-list');
        const markers = {};

        // 3. Función para centrar el mapa al hacer clic
        function focusProperty(id) {
            const prop = properties.find(p => p.id === id);
            map.flyTo([prop.lat, prop.lng], 15, { duration: 1.5 });
            markers[id].openPopup();
            
            // Si es móvil, desplaza al mapa
            if (window.innerWidth < 768) {
                document.querySelector('section').scrollIntoView({ behavior: 'smooth' });
            }
        }

        // 4. Crear marcadores y elementos de lista
        properties.forEach(prop => {
            // Marcador en el mapa
            const marker = L.marker([prop.lat, prop.lng]).addTo(map);
            markers[prop.id] = marker;

            const popupContent = `
                <div class="custom-popup min-w-[180px]">
                    <div class="text-[9px] font-bold text-blue-600 uppercase tracking-tighter mb-1">${prop.use}</div>
                    <div class="font-bold text-slate-800 text-sm mb-2">${prop.address}</div>
                    <div class="flex justify-between items-center bg-slate-50 p-2 rounded-lg">
                        <span class="text-xs font-bold text-green-600">$${prop.price.toLocaleString()}</span>
                        <span class="text-[10px] text-slate-400 font-mono">${prop.id}</span>
                    </div>
                </div>
            `;
            marker.bindPopup(popupContent);

            // Tarjeta lateral
            const card = document.createElement('div');
            card.className = "property-card bg-white p-4 rounded-2xl border border-slate-200 cursor-pointer shadow-sm";
            card.onclick = () => focusProperty(prop.id);
            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded-md text-[10px] font-bold uppercase tracking-wider">${prop.status}</span>
                    <span class="text-sm font-black text-slate-900">$${prop.price.toLocaleString()}</span>
                </div>
                <h3 class="font-bold text-slate-800 text-sm mb-1">${prop.address}</h3>
                <p class="text-[11px] text-slate-400 mb-4">${prop.city}, FL ${prop.zip}</p>
                <div class="flex items-center justify-between border-t border-slate-50 pt-3 text-[10px] font-semibold text-slate-500 uppercase">
                    <span class="flex items-center gap-1">📏 ${prop.area}</span>
                    <span class="font-mono text-slate-300">ID: ${prop.id.substring(0,6)}...</span>
                </div>
            `;
            listContainer.appendChild(card);
        });

        // 5. Buscador funcional
        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.property-card');
            
            properties.forEach((prop, index) => {
                const match = prop.address.toLowerCase().includes(term) || prop.id.includes(term);
                cards[index].style.display = match ? 'block' : 'none';
            });
        });
    </script>
</body>
</html>
